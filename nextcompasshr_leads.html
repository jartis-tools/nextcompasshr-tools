<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Next Compass HR — Lead Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .wrapper { max-width: 760px; margin: 0 auto; }
  .logo { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .logo span { color: #2563eb; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 2rem; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.25rem; margin-bottom: 1rem; }
  .card h3 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; color: #1a1a1a; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; }
  input, select { width: 100%; padding: 9px 11px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
  input:focus, select:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .field { margin-bottom: 12px; }
  .api-hint { font-size: 12px; color: #999; margin-top: 5px; }
  .btn-search { width: 100%; padding: 11px; font-size: 15px; font-weight: 600; background: #2563eb; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
  .btn-search:hover { background: #1d4ed8; }
  .btn-search:disabled { background: #93b4f5; cursor: not-allowed; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1rem; }
  .stat { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 14px; text-align: center; }
  .stat-num { font-size: 26px; font-weight: 700; color: #2563eb; }
  .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
  .status { font-size: 13px; color: #666; text-align: center; padding: 10px 0; min-height: 36px; }
  .lead-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 12px; }
  .lead-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .lead-company { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .lead-role { font-size: 13px; color: #666; margin-top: 2px; }
  .lead-meta { font-size: 12px; color: #aaa; margin-bottom: 10px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .badge-urgent { background: #fee2e2; color: #b91c1c; }
  .badge-active { background: #fef3c7; color: #92400e; }
  .insight-box { background: #f8f9ff; border: 1px solid #e0e7ff; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; }
  .insight-label { font-size: 11px; font-weight: 600; color: #6366f1; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .insight-reason { font-size: 13px; color: #444; line-height: 1.6; margin-bottom: 6px; }
  .insight-pitch { font-size: 13px; color: #1a1a1a; font-style: italic; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-outreach { font-size: 13px; padding: 7px 14px; background: #fff; border: 1px solid #d1d5db; border-radius: 7px; color: #1a1a1a; cursor: pointer; transition: background 0.1s; }
  .btn-outreach:hover { background: #f3f4f6; }
  .btn-primary-sm { background: #2563eb; color: #fff; border-color: #2563eb; }
  .btn-primary-sm:hover { background: #1d4ed8; }
  .error-box { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #b91c1c; margin-bottom: 1rem; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 1.5rem; max-width: 540px; width: 100%; max-height: 80vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .modal textarea { width: 100%; min-height: 160px; padding: 10px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; resize: vertical; line-height: 1.6; }
  .modal-btns { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  .btn-copy { padding: 8px 16px; background: #2563eb; color: #fff; border: none; border-radius: 7px; font-size: 14px; cursor: pointer; }
  .btn-close { padding: 8px 16px; background: #f3f4f6; color: #1a1a1a; border: none; border-radius: 7px; font-size: 14px; cursor: pointer; }
  .loading-dots::after { content: ''; animation: dots 1.2s steps(4, end) infinite; }
  @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }
  @media (max-width: 500px) { .grid2 { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(3,1fr); } }
</style>
</head>
<body>
<div class="wrapper">
  <div class="logo">Next Compass <span>HR</span></div>
  <div class="subtitle">Lead finder — find small businesses urgently hiring near you</div>

  <div class="card">
    <h3>Search settings</h3>
    <div class="grid2">
      <div class="field">
        <label>Location</label>
        <input type="text" id="location" value="Indianapolis, IN" placeholder="City, State" />
      </div>
      <div class="field">
        <label>Industry</label>
        <select id="industry">
          <option value="construction electrician plumber carpenter contractor trades">Construction / Trades</option>
          <option value="restaurant cook kitchen chef food service">Restaurant / Food Service</option>
          <option value="retail store cashier associate sales">Retail</option>
          <option value="healthcare home care aide caregiver nurse CNA">Healthcare / Home Care</option>
          <option value="warehouse driver delivery logistics forklift">Warehouse / Logistics</option>
          <option value="landscaping lawn care groundskeeper outdoor">Landscaping</option>
          <option value="cleaning janitorial housekeeping commercial">Cleaning / Janitorial</option>
          <option value="auto mechanic technician automotive repair">Auto / Mechanical</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Anthropic API Key</label>
      <input type="password" id="anthrokey" placeholder="sk-ant-..." />
      <div class="api-hint">Get a free key at console.anthropic.com — never shared, stays in your browser only</div>
    </div>
    <button class="btn-search" id="searchBtn" onclick="searchLeads()">Find leads</button>
  </div>

  <div id="errorBox" class="error-box" style="display:none;"></div>
  <div id="stats" class="stats" style="display:none;">
    <div class="stat"><div class="stat-num" id="totalFound">0</div><div class="stat-label">Leads found</div></div>
    <div class="stat"><div class="stat-num" id="urgentCount">0</div><div class="stat-label">Urgent hires</div></div>
    <div class="stat"><div class="stat-num" id="qualifiedCount">0</div><div class="stat-label">Qualified leads</div></div>
  </div>
  <div class="status" id="status"></div>
  <div id="leads"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Outreach message</h3>
    <textarea id="modalText"></textarea>
    <div class="modal-btns">
      <button class="btn-close" onclick="closeModal()">Close</button>
      <button class="btn-copy" onclick="copyMessage()">Copy message</button>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are a lead generation assistant for Next Compass HR, a service that helps small businesses (under 30 employees) build HR systems, improve hiring, and create onboarding processes. Pricing starts at $400 for a single hire setup up to $1,500+ for growing teams.

Search the web for real small businesses in the specified location that are urgently hiring right now. Focus ONLY on small local independent businesses — not large chains, franchises with corporate HR, staffing agencies, or companies over 50 employees.

After searching, respond ONLY with a raw JSON array — absolutely no markdown, no explanation, no backticks, no extra text. Format exactly:
[
  {
    "company": "Exact Company Name",
    "job_title": "Job Title They Are Hiring For",
    "location": "City, State",
    "is_urgent": true,
    "reason": "One sentence: why this small business likely has no HR structure and needs Next Compass HR",
    "pitch": "One conversational sentence to open a cold call or text — reference their specific hiring situation"
  }
]
Return 6 leads. Only include real businesses found in search results.`;

async function searchLeads() {
  const location = document.getElementById('location').value.trim() || 'Indianapolis, IN';
  const industry = document.getElementById('industry').value;
  const apiKey = document.getElementById('anthrokey').value.trim();
  const btn = document.getElementById('searchBtn');
  const status = document.getElementById('status');
  const errorBox = document.getElementById('errorBox');

  errorBox.style.display = 'none';
  document.getElementById('leads').innerHTML = '';
  document.getElementById('stats').style.display = 'none';

  if (!apiKey) {
    errorBox.textContent = 'Please enter your Anthropic API key above. Get one free at console.anthropic.com';
    errorBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Searching...';
  status.innerHTML = '<span class="loading-dots">Searching the web for urgent job postings</span>';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: SYSTEM_PROMPT,
        messages: [{
          role: 'user',
          content: `Search for small businesses urgently hiring ${industry} workers in ${location} right now. Find real current job postings from local small independent businesses only. Return only the JSON array, nothing else.`
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const fullText = (data.content || []).map(c => c.text || '').filter(Boolean).join('');

    if (!fullText) throw new Error('No response from AI. Check your API key and try again.');

    const jsonMatch = fullText.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('Could not read lead data. Try again.');

    const leads = JSON.parse(jsonMatch[0]);
    if (!Array.isArray(leads) || leads.length === 0) throw new Error('No leads found. Try a different industry or location.');

    status.textContent = `Found ${leads.length} leads — building your list...`;
    renderLeads(leads);

  } catch(err) {
    errorBox.textContent = `Error: ${err.message}`;
    errorBox.style.display = 'block';
    status.textContent = '';
  }

  btn.disabled = false;
  btn.textContent = 'Find leads';
}

function renderLeads(leads) {
  const container = document.getElementById('leads');
  container.innerHTML = '';
  let urgent = 0, qualified = 0;

  leads.forEach(lead => {
    if (lead.is_urgent) urgent++;
    qualified++;

    const card = document.createElement('div');
    card.className = 'lead-card';
    const badgeClass = lead.is_urgent ? 'badge-urgent' : 'badge-active';
    const badgeText = lead.is_urgent ? 'Urgent hire' : 'Active hire';

    card.innerHTML = `
      <div class="lead-top">
        <div>
          <div class="lead-company">${lead.company || 'Unknown'}</div>
          <div class="lead-role">${lead.job_title || ''}</div>
        </div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="lead-meta">${lead.location || ''}</div>
      <div class="insight-box">
        <div class="insight-label">Why they need HR help</div>
        <div class="insight-reason">${lead.reason || ''}</div>
        <div class="insight-pitch">"${lead.pitch || ''}"</div>
      </div>
      <div class="btn-row">
        <button class="btn-outreach btn-primary-sm" onclick="generateOutreach('${esc(lead.company)}','${esc(lead.job_title)}','${esc(lead.location)}','${esc(lead.pitch)}')">Draft outreach message</button>
        <button class="btn-outreach" onclick="searchCompany('${esc(lead.company)}','${esc(lead.location)}')">Search company</button>
      </div>
    `;
    container.appendChild(card);
  });

  document.getElementById('stats').style.display = 'grid';
  document.getElementById('totalFound').textContent = leads.length;
  document.getElementById('urgentCount').textContent = urgent;
  document.getElementById('qualifiedCount').textContent = qualified;
  document.getElementById('status').textContent = `Done — ${leads.length} leads ready for outreach.`;
}

async function generateOutreach(company, title, location, pitch) {
  const apiKey = document.getElementById('anthrokey').value.trim();
  if (!apiKey) { alert('Please enter your Anthropic API key first.'); return; }

  document.getElementById('modalTitle').textContent = `Outreach — ${company}`;
  document.getElementById('modalText').value = 'Writing your message...';
  document.getElementById('modalOverlay').classList.add('open');

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        messages: [{
          role: 'user',
          content: `Write a short, friendly cold outreach TEXT MESSAGE to the owner of ${company} in ${location}. They are urgently hiring a ${title}. The message is from Next Compass HR (nextcompasshr.com, call/text 463-279-9778).

Opening hook to use: "${pitch}"

Rules:
- Keep it under 5 sentences
- Sound like a real person texting, not a salesperson
- Reference their specific hiring situation
- Mention that Next Compass HR helps small businesses hire and onboard faster so it does not all fall on the owner
- End with a soft call to action (reply, call, or visit the site)
- Do not use hashtags or emojis`
        }]
      })
    });

    const data = await response.json();
    const text = (data.content || []).map(c => c.text || '').join('').trim();
    document.getElementById('modalText').value = text;
  } catch(err) {
    document.getElementById('modalText').value = `Error generating message: ${err.message}`;
  }
}

function searchCompany(company, location) {
  const url = `https://www.google.com/search?q=${encodeURIComponent(company + ' ' + location)}`;
  window.open(url, '_blank');
}

function copyMessage() {
  const text = document.getElementById('modalText').value;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy message', 2000);
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function esc(str) {
  return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
